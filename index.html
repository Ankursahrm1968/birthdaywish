<style>
@import url('https://fonts.googleapis.com/css2?family=Pinyon+Script&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Great+Vibes&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  background:linear-gradient(160deg,#ff80ab 0%,#f48fb1 15%,#fce4ec 30%,#f8bbd9 45%,#ff80ab 60%,#f48fb1 75%,#fce4ec 100%);
  background-size:400% 400%;
  animation:bgWave 8s ease infinite;
  display:flex;align-items:flex-start;justify-content:center;
  overflow-x:hidden;position:relative;
  padding:0 0 3rem;
  flex-direction:column;align-items:center;
}
@keyframes bgWave{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}

/* ===== PARTICLE LAYERS ===== */
.layer-kitties,.layer-petals,.layer-sparkles,.layer-hearts{
  position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;
}

.flt{position:absolute;animation:floatUp linear infinite;opacity:0;user-select:none;}
@keyframes floatUp{
  0%{transform:translateY(105vh) rotate(-20deg) scale(0.8);opacity:0;}
  8%{opacity:1;}
  50%{transform:translateY(50vh) rotate(15deg) scale(1.1);}
  92%{opacity:0.7;}
  100%{transform:translateY(-8vh) rotate(-10deg) scale(0.9);opacity:0;}
}

.petal{position:absolute;border-radius:60% 0 60% 0;animation:petalDrift linear infinite;opacity:0;}
@keyframes petalDrift{
  0%{transform:translateY(-5vh) rotate(0deg) translateX(0px);opacity:0;}
  10%{opacity:0.7;}
  50%{transform:translateY(50vh) rotate(200deg) translateX(40px);}
  90%{opacity:0.5;}
  100%{transform:translateY(108vh) rotate(400deg) translateX(-30px);opacity:0;}
}

.heart-p{position:absolute;font-size:14px;animation:heartFloat ease-in-out infinite;opacity:0;}
@keyframes heartFloat{
  0%{transform:translateY(0) scale(0.5);opacity:0;}
  20%{opacity:0.8;}
  80%{opacity:0.5;}
  100%{transform:translateY(-80px) scale(1.2);opacity:0;}
}

.spark-p{position:absolute;border-radius:50%;animation:sparkTwink ease-in-out infinite;}
@keyframes sparkTwink{0%,100%{transform:scale(0) rotate(0deg);opacity:0;}50%{transform:scale(2) rotate(180deg);opacity:1;}}

/* ===== HERO NAME ===== */
.hero{
  position:relative;z-index:10;
  width:100%;text-align:center;
  padding:3.5rem 1rem 0.5rem;
  animation:heroIn 1.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes heroIn{
  0%{opacity:0;transform:translateY(-60px) scale(0.7);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}
.hero-label{
  font-family:'IM Fell English',serif;font-style:italic;
  color:rgba(255,255,255,0.75);font-size:0.9rem;letter-spacing:4px;
  text-shadow:0 2px 10px rgba(200,0,80,0.3);
  margin-bottom:0.3rem;
  animation:fadeSlideUp 1s ease 0.2s both;
}
.hero-name{
  font-family:'Great Vibes',cursive;
  font-size:clamp(4rem,12vw,7rem);
  color:#fff;
  text-shadow:
    0 0 40px rgba(255,100,150,0.9),
    0 0 80px rgba(255,50,120,0.6),
    0 4px 20px rgba(180,0,80,0.4),
    0 8px 40px rgba(255,180,200,0.3);
  line-height:1;
  animation:nameGlow 3s ease-in-out infinite,fadeSlideUp 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
  letter-spacing:2px;
}
@keyframes nameGlow{
  0%,100%{text-shadow:0 0 40px rgba(255,100,150,0.9),0 0 80px rgba(255,50,120,0.6),0 4px 20px rgba(180,0,80,0.4);}
  50%{text-shadow:0 0 60px rgba(255,150,180,1),0 0 120px rgba(255,80,140,0.8),0 4px 30px rgba(200,0,100,0.5),0 0 200px rgba(255,200,220,0.2);}
}
.hero-sub{
  font-family:'Pinyon Script',cursive;
  color:rgba(255,255,255,0.85);font-size:1.6rem;
  text-shadow:0 2px 15px rgba(200,0,80,0.5);
  margin-top:0.2rem;
  animation:fadeSlideUp 1s ease 0.4s both;
}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

.badge-row{
  position:relative;z-index:10;
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
  padding:0.8
